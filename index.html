<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample HTML5 Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Main Navigation Bar -->
    <header>
        <h1>Welcome to My Website</h1>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Content Area -->
    <main>
        <section id="home">
            <article>
                <h2>Introduction to HTML5</h2>
                <p>This is a standard paragraph element nested inside a semantic article tag.</p>
                <img src="https://placeholder.com" alt="Placeholder Image">
            </article>
        </section>

        <!-- Media Showcase Section -->
        <section id="media">
            <h2>HTML5 Native Video Player</h2>
            <video controls width="400">
                <source src="movie.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </section>
    </main>

    <!-- Page Footer -->
    <footer>
        <p>&copy; 2026 VSIT Company. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
